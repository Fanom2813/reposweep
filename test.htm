<html window-frame="extended"
      window-icon="icon.svg"
      window-width="960dip" window-height="680dip"
      window-resizable="true">
  <head>
    <title>RepoSweep Debug</title>
    <style src="styles/tokens.css" />
    <style src="styles/components.css" />
    <style src="styles/chrome.css" />
    <style src="styles/app.css" />
    <script type="module">

      // Test A: render with <body> root (like sample)
      // Test B: render WITHOUT <body> root
      // Test C: use content() instead of patch()

      class TestA extends Element {
        render() {
          return <body>
            <div style="padding:40dip;">
              <h1>Test A - body root</h1>
            </div>
          </body>;
        }
      }

      class TestB extends Element {
        render() {
          return <div style="padding:40dip; size:*;">
            <h1>Test B - div root</h1>
            <p>No body wrapper</p>
          </div>;
        }
      }

      // Test: try patch vs content
      document.ready = function() {
        console.log("trying patch with div root...");
        document.body.patch(<TestB />);
        console.log("done");
      };
    </script>
  </head>
  <body></body>
</html>
